<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="app-sidenav">

    <div class="sidenav-brand">
      <div class="brand-icon">
        <mat-icon>account_balance_wallet</mat-icon>
      </div>
      <div class="brand-text">
        <div class="brand-name">FinControl</div>
        <div class="brand-sub">Controle Financeiro</div>
      </div>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-link"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label | translate }}</span>
        </a>
      }
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <mat-toolbar class="app-toolbar">
      <span class="toolbar-title">{{ 'APP.TITLE' | translate }}</span>
    </mat-toolbar>
    <main class="main-content">
      <div class="page-wrapper" [attr.data-key]="pageKey">
        <router-outlet />
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
